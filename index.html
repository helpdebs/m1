<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inglês em Jogos — Michelle</title>
<style>
  :root{
    --mint:#dff8ef; --mint-2:#c8f4e6; --aqua:#c4f2ff;
    --blue:#82c9ff; --blue-dark:#2267b2; --blue-deep:#1b4f8a;
    --green:#8fe36b; --green-dark:#3f8a12;
    --cream:#fff8e6; --pink:#ffe6ec; --coral:#e0573f;
    --purple:#8e70d8; --gold:#ffc94d;
    --text:#1b1a2e; --muted:#6a6284;
    --line:rgba(49,39,86,.16);
    --card-shadow:0 10px 22px rgba(37,68,120,.16);
    --radius:24px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    color:var(--text);
    font-family:"Trebuchet MS",Verdana,system-ui,sans-serif;
    background:
      radial-gradient(circle at 8% 6%, rgba(143,227,107,.35), transparent 26%),
      radial-gradient(circle at 92% 6%, rgba(196,242,255,.85), transparent 30%),
      radial-gradient(circle at 50% 108%, rgba(255,230,236,.9), transparent 40%),
      linear-gradient(160deg,#fffdf6 0%,#eafff7 46%,#eff7ff 100%);
    min-height:100vh;
  }
  button{font-family:inherit;cursor:pointer;}
  .wrap{width:min(940px,calc(100% - 24px));margin:0 auto;padding:16px 0 60px;}

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:linear-gradient(180deg,#74cdfa,#2c9fe8 55%,#2267b2);
    color:#fff;border-radius:20px;padding:12px 16px;margin-bottom:16px;
    box-shadow:var(--card-shadow);
  }
  .brand{display:flex;align-items:center;gap:12px;font-weight:900;font-size:1.15rem;letter-spacing:-.01em;text-shadow:1px 1px 0 rgba(0,0,0,.18);}
  .brand .logo{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;font-size:1.5rem;background:linear-gradient(135deg,#b9ff70,#c4f2ff);border:2px solid rgba(255,255,255,.75);}
  .sound-toggle{
    display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.22);
    border:2px solid rgba(255,255,255,.6);color:#fff;font-weight:800;
    padding:9px 14px;border-radius:14px;font-size:.95rem;
  }
  .sound-toggle:hover{background:rgba(255,255,255,.34);}
  .sound-toggle .ico{font-size:1.15rem;}

  /* ---------- Screens ---------- */
  .screen{display:none;animation:fade .3s ease;}
  .screen.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  .panel{background:rgba(255,255,255,.82);border:2px solid rgba(34,103,178,.14);border-radius:var(--radius);padding:22px;box-shadow:var(--card-shadow);backdrop-filter:blur(10px);}

  h1.hero{font-size:1.75rem;margin:.2em 0 .1em;text-align:center;letter-spacing:-.02em;}
  .hero-sub{text-align:center;color:var(--muted);font-size:1.05rem;margin:0 0 6px;}

  /* ---------- Home track choice ---------- */
  .tracks{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:22px;}
  .track-btn{
    border:none;border-radius:26px;padding:30px 20px;color:#fff;text-align:center;
    box-shadow:var(--card-shadow);transition:transform .12s ease, box-shadow .12s ease;
    display:flex;flex-direction:column;align-items:center;gap:10px;min-height:210px;justify-content:center;
  }
  .track-btn:hover{transform:translateY(-4px);box-shadow:0 16px 30px rgba(37,68,120,.25);}
  .track-btn:active{transform:translateY(-1px);}
  .track-btn .emoji{font-size:3.6rem;line-height:1;filter:drop-shadow(0 4px 6px rgba(0,0,0,.18));}
  .track-btn .t-title{font-size:1.4rem;font-weight:900;letter-spacing:-.01em;}
  .track-btn .t-desc{font-size:.95rem;opacity:.95;font-weight:600;max-width:15em;}
  .track-btn .t-prog{margin-top:4px;font-size:.85rem;background:rgba(255,255,255,.25);padding:4px 12px;border-radius:20px;font-weight:800;}
  .track-viagem{background:linear-gradient(160deg,#43b0f0,#2267b2);}
  .track-conversa{background:linear-gradient(160deg,#7bd66f,#3f8a12);}

  .home-tip{margin-top:22px;background:var(--cream);border:2px dashed var(--gold);border-radius:18px;padding:14px 18px;color:#7a5b12;font-size:.98rem;text-align:center;}

  /* ---------- Levels list ---------- */
  .back-btn{border:2px solid var(--blue-dark);background:#fff;color:var(--blue-dark);font-weight:800;padding:10px 16px;border-radius:14px;font-size:.98rem;display:inline-flex;align-items:center;gap:7px;margin-bottom:14px;}
  .back-btn:hover{background:var(--aqua);}
  .track-head{display:flex;align-items:center;gap:14px;margin-bottom:6px;}
  .track-head .th-emoji{font-size:2.4rem;}
  .track-head h2{margin:0;font-size:1.5rem;}
  .track-head p{margin:2px 0 0;color:var(--muted);}

  .levels{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px;}
  .level-card{
    position:relative;border-radius:22px;padding:20px 18px 18px;color:#fff;text-align:left;border:none;
    box-shadow:var(--card-shadow);transition:transform .12s ease;min-height:150px;
    display:flex;flex-direction:column;gap:6px;
  }
  .level-card:hover{transform:translateY(-3px);}
  .level-card .lvl-num{font-size:.8rem;font-weight:800;background:rgba(255,255,255,.28);padding:3px 10px;border-radius:14px;align-self:flex-start;}
  .level-card .lvl-icon{font-size:2.2rem;line-height:1;}
  .level-card .lvl-title{font-size:1.2rem;font-weight:900;}
  .level-card .lvl-desc{font-size:.9rem;opacity:.95;font-weight:600;}
  .lvl-1{background:linear-gradient(155deg,#59c1f2,#2b7fc4);}
  .lvl-2{background:linear-gradient(155deg,#8e70d8,#5b3fb0);}
  .lvl-3{background:linear-gradient(155deg,#f0a44e,#d9722a);}
  .lvl-4{background:linear-gradient(155deg,#ee6f8e,#c23a63);}
  .level-card.locked{filter:grayscale(.85) brightness(.9);cursor:not-allowed;color:#eee;}
  .level-card .lock-badge{position:absolute;top:14px;right:14px;font-size:1.5rem;}
  .level-card .done-badge{position:absolute;top:12px;right:12px;font-size:.85rem;background:#fff;color:var(--green-dark);font-weight:900;border-radius:20px;padding:4px 10px;box-shadow:0 3px 8px rgba(0,0,0,.15);}
  .level-card.locked .lvl-icon,.level-card.locked .lvl-title,.level-card.locked .lvl-desc{opacity:.55;}
  .locked-hint{grid-column:1/-1;text-align:center;color:var(--muted);font-size:.9rem;margin-top:-4px;}

  /* ---------- Game shell ---------- */
  .game-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:6px;}
  .game-head .gh-title{font-size:1.3rem;font-weight:900;display:flex;align-items:center;gap:10px;}
  .game-head .stars{font-size:.85rem;font-weight:800;color:var(--muted);background:var(--mint);padding:4px 12px;border-radius:14px;}
  .instr{background:var(--mint);border:2px solid var(--mint-2);border-radius:16px;padding:12px 16px;color:#1c5a44;font-size:1rem;margin:12px 0 18px;display:flex;gap:10px;align-items:center;}
  .instr .bulb{font-size:1.4rem;}
  .progress-line{height:12px;border-radius:10px;background:rgba(34,103,178,.14);overflow:hidden;margin:0 0 16px;}
  .progress-line > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--green),#4bbf2a);border-radius:10px;transition:width .35s ease;}

  /* Memory game */
  .mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .mem-card{aspect-ratio:3/2.4;border-radius:16px;border:none;position:relative;background:transparent;perspective:700px;padding:0;}
  .mem-inner{position:absolute;inset:0;transition:transform .4s;transform-style:preserve-3d;}
  .mem-card.flipped .mem-inner,.mem-card.matched .mem-inner{transform:rotateY(180deg);}
  .mem-face{position:absolute;inset:0;border-radius:16px;display:grid;place-items:center;padding:8px;backface-visibility:hidden;box-shadow:0 5px 12px rgba(37,68,120,.16);text-align:center;}
  .mem-front{background:linear-gradient(150deg,#5fb2ef,#2267b2);color:#fff;font-size:2rem;}
  .mem-back{background:#fff;border:2px solid var(--line);transform:rotateY(180deg);font-weight:800;color:var(--text);font-size:1.02rem;line-height:1.15;}
  .mem-back.en{background:linear-gradient(150deg,#eaf7ff,#d3ecff);color:var(--blue-deep);}
  .mem-back.pt{background:linear-gradient(150deg,#f4ffe9,#e3f8cf);color:var(--green-dark);}
  .mem-card.matched .mem-back{outline:3px solid var(--green);outline-offset:-3px;}
  .mem-tag{position:absolute;top:6px;left:8px;font-size:.62rem;font-weight:900;letter-spacing:.06em;opacity:.65;}

  /* Connect game */
  .connect{display:grid;grid-template-columns:1fr 1fr;gap:26px;}
  .col h4{margin:0 0 10px;text-align:center;color:var(--muted);font-size:.9rem;text-transform:uppercase;letter-spacing:.05em;}
  .col-items{display:flex;flex-direction:column;gap:10px;}
  .conn-item{border:2px solid var(--line);background:#fff;border-radius:14px;padding:13px 12px;font-size:1.05rem;font-weight:700;text-align:center;transition:all .15s ease;color:var(--text);width:100%;}
  .col.en .conn-item{background:linear-gradient(150deg,#eaf7ff,#d8eeff);color:var(--blue-deep);}
  .col.pt .conn-item{background:linear-gradient(150deg,#f4ffe9,#e6f9d5);color:var(--green-dark);}
  .conn-item:hover:not(.done){transform:scale(1.02);border-color:var(--blue);}
  .conn-item.sel{outline:3px solid var(--gold);outline-offset:1px;transform:scale(1.03);}
  .conn-item.done{opacity:.45;pointer-events:none;text-decoration:line-through;}
  .conn-item.wrong{animation:shake .35s;border-color:var(--coral);}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}

  /* Listen / choose game */
  .listen-stage{text-align:center;}
  .big-audio{border:none;border-radius:24px;background:linear-gradient(150deg,#5fb2ef,#2267b2);color:#fff;padding:26px 20px;font-size:1.25rem;font-weight:900;display:inline-flex;flex-direction:column;align-items:center;gap:8px;box-shadow:var(--card-shadow);margin:6px auto 4px;min-width:220px;}
  .big-audio .spk{font-size:3rem;line-height:1;}
  .big-audio:hover{transform:translateY(-2px);}
  .replay{margin:10px auto 20px;display:inline-flex;gap:8px;align-items:center;background:#fff;border:2px solid var(--blue);color:var(--blue-dark);font-weight:800;padding:8px 16px;border-radius:14px;}
  .options{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px;}
  .opt{border:2px solid var(--line);background:#fff;border-radius:16px;padding:16px 12px;font-size:1.1rem;font-weight:800;transition:all .15s;color:var(--text);}
  .opt:hover:not(:disabled){border-color:var(--blue);transform:scale(1.02);}
  .opt:disabled{cursor:default;}
  .opt.correct{background:linear-gradient(150deg,#e3f8cf,#b9f08a);border-color:var(--green);color:var(--green-dark);}
  .opt.wrong{background:#ffe1da;border-color:var(--coral);color:var(--coral);}
  .prompt-word{font-size:1.6rem;font-weight:900;margin:6px 0 14px;color:var(--blue-deep);text-align:center;}
  .prompt-label{text-align:center;color:var(--muted);font-size:.95rem;margin-bottom:2px;}

  /* Win overlay */
  .win{text-align:center;padding:22px;}
  .win .big{font-size:3rem;}
  .win h3{font-size:1.5rem;margin:6px 0;}
  .win p{color:var(--muted);margin:0 0 16px;}
  .win .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .btn-primary{border:none;background:linear-gradient(150deg,#7bd66f,#3f8a12);color:#fff;font-weight:900;padding:14px 22px;border-radius:16px;font-size:1.05rem;box-shadow:var(--card-shadow);}
  .btn-primary:hover{transform:translateY(-2px);}
  .btn-ghost{border:2px solid var(--blue-dark);background:#fff;color:var(--blue-dark);font-weight:800;padding:14px 20px;border-radius:16px;font-size:1.02rem;}
  .btn-ghost:hover{background:var(--aqua);}
  .win .stars-big{font-size:1.6rem;letter-spacing:4px;margin-top:6px;}

  @media (max-width:640px){
    .tracks{grid-template-columns:1fr;}
    .levels{grid-template-columns:1fr;}
    .mem-grid{gap:9px;}
    .mem-front{font-size:1.5rem;}
    .connect{gap:12px;}
    .options{grid-template-columns:1fr;}
    h1.hero{font-size:1.45rem;}
    .brand{font-size:1rem;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand"><span class="logo">🎮</span><span>Inglês em Jogos</span></div>
    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">
      <span class="ico" id="soundIcon">🔊</span><span id="soundText">Som ligado</span>
    </button>
  </div>

  <!-- ============ HOME ============ -->
  <section class="screen active" id="home">
    <div class="panel">
      <h1 class="hero">Oi, Michelle! 👋 Bora treinar jogando?</h1>
      <p class="hero-sub">Escolha o que você quer treinar hoje:</p>
      <div class="tracks">
        <button class="track-btn track-viagem" onclick="openTrack('viagem')">
          <span class="emoji">🧳</span>
          <span class="t-title">Vocabulário para Viagem</span>
          <span class="t-desc">Aeroporto, hotel, restaurante e pedidos do dia a dia</span>
          <span class="t-prog" id="prog-viagem">0 de 4 jogos</span>
        </button>
        <button class="track-btn track-conversa" onclick="openTrack('conversacao')">
          <span class="emoji">💬</span>
          <span class="t-title">Conversação</span>
          <span class="t-desc">Falar do seu dia, gostos, rotina e perguntas</span>
          <span class="t-prog" id="prog-conversacao">0 de 4 jogos</span>
        </button>
      </div>
      <div class="home-tip">💡 Toque nas cartas para <b>ouvir o inglês</b>. Vá jogando — o inglês gruda sozinho! 😊</div>
    </div>
  </section>

  <!-- ============ TRACK / LEVELS ============ -->
  <section class="screen" id="track">
    <button class="back-btn" onclick="goHome()">← Voltar ao início</button>
    <div class="panel">
      <div class="track-head">
        <span class="th-emoji" id="trackEmoji">🧳</span>
        <div>
          <h2 id="trackTitle">Vocabulário para Viagem</h2>
          <p>Conclua um jogo para liberar o próximo 🔓</p>
        </div>
      </div>
      <div class="levels" id="levelsGrid"></div>
    </div>
  </section>

  <!-- ============ GAME ============ -->
  <section class="screen" id="game">
    <button class="back-btn" onclick="backToTrack()">← Voltar aos jogos</button>
    <div class="panel">
      <div class="game-head">
        <div class="gh-title"><span id="gameIcon">🎴</span><span id="gameName">Jogo</span></div>
        <span class="stars" id="gameLevelTag"></span>
      </div>
      <div class="instr"><span class="bulb">💡</span><span id="gameInstr"></span></div>
      <div class="progress-line"><i id="gameProgressBar"></i></div>
      <div id="gameArea"></div>
    </div>
  </section>

</div>

<script>
/* =========================================================
   DADOS — vocabulário retirado das aulas da Michelle
   ========================================================= */
const DATA = {
  viagem: {
    title: "Vocabulário para Viagem",
    emoji: "🧳",
    levels: [
      {
        icon:"🍽️", name:"Na Mesa",
        game:"memory",
        instr:"Vire as cartas e ache o par: a palavra em inglês e o significado. Ao virar, você ouve o inglês!",
        pairs:[
          {en:"menu", pt:"cardápio"},
          {en:"fork", pt:"garfo"},
          {en:"knife", pt:"faca"},
          {en:"spoon", pt:"colher"},
          {en:"glass", pt:"copo"},
          {en:"napkin", pt:"guardanapo"},
        ]
      },
      {
        icon:"✈️", name:"Aeroporto e Hotel",
        game:"connect",
        instr:"Toque numa palavra em inglês (você ouve o áudio) e depois no significado certo.",
        pairs:[
          {en:"airport", pt:"aeroporto"},
          {en:"passport", pt:"passaporte"},
          {en:"suitcase", pt:"mala"},
          {en:"flight", pt:"voo"},
          {en:"room key", pt:"chave do quarto"},
          {en:"towel", pt:"toalha"},
        ]
      },
      {
        icon:"🏙️", name:"Na Cidade",
        game:"listen",
        instr:"Toque no alto-falante, ouça o inglês e escolha o significado certo.",
        pairs:[
          {en:"the toilet", pt:"o banheiro"},
          {en:"the museum", pt:"o museu"},
          {en:"the subway", pt:"o metrô"},
          {en:"the pharmacy", pt:"a farmácia"},
          {en:"the train station", pt:"a estação de trem"},
          {en:"cash", pt:"dinheiro"},
          {en:"card", pt:"cartão"},
        ]
      },
      {
        icon:"🗣️", name:"Desafio Final — Frases úteis",
        game:"produce",
        instr:"Leia o português e escolha a frase certa em inglês. No acerto, você ouve a frase!",
        pairs:[
          {en:"Can you help me?", pt:"Você pode me ajudar?"},
          {en:"Do you speak English?", pt:"Você fala inglês?"},
          {en:"Can I pay with cash?", pt:"Posso pagar em dinheiro?"},
          {en:"Can I have the menu, please?", pt:"Pode me ver o cardápio, por favor?"},
          {en:"Do you have a map?", pt:"Você tem um mapa?"},
          {en:"Can I sit here?", pt:"Posso sentar aqui?"},
        ]
      },
    ]
  },
  conversacao: {
    title: "Conversação",
    emoji: "💬",
    levels: [
      {
        icon:"❤️", name:"Do que você gosta",
        game:"memory",
        instr:"Vire as cartas e ache o par: inglês e significado. Ao virar, você ouve o inglês!",
        pairs:[
          {en:"travel to new places", pt:"viajar para novos lugares"},
          {en:"eat good food", pt:"comer boa comida"},
          {en:"go to a restaurant", pt:"ir a um restaurante"},
          {en:"go to the gym", pt:"ir à academia"},
          {en:"listen to music", pt:"ouvir música"},
          {en:"read books", pt:"ler livros"},
        ]
      },
      {
        icon:"🏠", name:"Rotina",
        game:"connect",
        instr:"Toque numa expressão em inglês (você ouve o áudio) e depois no significado certo.",
        pairs:[
          {en:"cook", pt:"cozinhar"},
          {en:"talk to my friends", pt:"falar com meus amigos"},
          {en:"watch TV", pt:"assistir TV"},
          {en:"travel to the beach", pt:"viajar para a praia"},
          {en:"pay the bills", pt:"pagar as contas"},
          {en:"have breakfast", pt:"tomar café da manhã"},
        ]
      },
      {
        icon:"❓", name:"Perguntas e Frequência",
        game:"listen",
        instr:"Toque no alto-falante, ouça o inglês e escolha o significado certo.",
        pairs:[
          {en:"what", pt:"o que / qual"},
          {en:"where", pt:"onde"},
          {en:"when", pt:"quando"},
          {en:"who", pt:"quem"},
          {en:"why", pt:"por que"},
          {en:"how", pt:"como"},
          {en:"always", pt:"sempre"},
          {en:"never", pt:"nunca"},
        ]
      },
      {
        icon:"🗣️", name:"Desafio Final — Conversa de verdade",
        game:"produce",
        instr:"Leia o português e escolha a frase certa em inglês. No acerto, você ouve a frase!",
        pairs:[
          {en:"What do you like to do?", pt:"O que você gosta de fazer?"},
          {en:"Where do you live?", pt:"Onde você mora?"},
          {en:"Do you like the beach?", pt:"Você gosta da praia?"},
          {en:"I don't travel every year.", pt:"Eu não viajo todo ano."},
          {en:"How are you?", pt:"Como você está?"},
          {en:"I'm tired.", pt:"Estou cansada."},
        ]
      },
    ]
  }
};

/* =========================================================
   ESTADO / PROGRESSO
   ========================================================= */
const STORE_KEY = "michelle_ingles_jogos_v1";
let progress = loadProgress();      // { viagem:[bool x4], conversacao:[bool x4] }
let soundOn = true;
let currentTrack = null;
let currentLevel = 0;

function loadProgress(){
  try{
    const p = JSON.parse(localStorage.getItem(STORE_KEY));
    if(p && p.viagem && p.conversacao) return p;
  }catch(e){}
  return { viagem:[false,false,false,false], conversacao:[false,false,false,false] };
}
function saveProgress(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(progress)); }catch(e){} }

/* =========================================================
   ÁUDIO — voz do navegador (funciona sem internet)
   ========================================================= */
let enVoice = null;
function pickVoice(){
  const voices = speechSynthesis.getVoices();
  enVoice = voices.find(v=>/en[-_]US/i.test(v.lang)) ||
            voices.find(v=>/^en/i.test(v.lang)) || null;
}
if(typeof speechSynthesis !== "undefined"){
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
function speak(text){
  if(!soundOn || typeof speechSynthesis === "undefined") return;
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";
    u.rate = 0.9;
    if(enVoice) u.voice = enVoice;
    speechSynthesis.speak(u);
  }catch(e){}
}
function toggleSound(){
  soundOn = !soundOn;
  document.getElementById("soundIcon").textContent = soundOn ? "🔊" : "🔇";
  document.getElementById("soundText").textContent = soundOn ? "Som ligado" : "Som desligado";
  if(!soundOn && typeof speechSynthesis!=="undefined") speechSynthesis.cancel();
}

/* =========================================================
   NAVEGAÇÃO
   ========================================================= */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo({top:0, behavior:"smooth"});
}
function goHome(){ if(typeof speechSynthesis!=="undefined") speechSynthesis.cancel(); updateHomeProgress(); show("home"); }
function updateHomeProgress(){
  ["viagem","conversacao"].forEach(t=>{
    const done = progress[t].filter(Boolean).length;
    document.getElementById("prog-"+t).textContent = done+" de 4 jogos";
  });
}
function openTrack(track){
  currentTrack = track;
  const d = DATA[track];
  document.getElementById("trackEmoji").textContent = d.emoji;
  document.getElementById("trackTitle").textContent = d.title;
  renderLevels();
  show("track");
}
function renderLevels(){
  const d = DATA[currentTrack];
  const grid = document.getElementById("levelsGrid");
  grid.innerHTML = "";
  d.levels.forEach((lvl, i)=>{
    const done = progress[currentTrack][i];
    const unlocked = i===0 || progress[currentTrack][i-1];
    const card = document.createElement("button");
    card.className = `level-card lvl-${i+1}` + (unlocked ? "" : " locked");
    card.innerHTML = `
      ${done ? '<span class="done-badge">✓ Concluído</span>' : (unlocked ? '' : '<span class="lock-badge">🔒</span>')}
      <span class="lvl-num">NÍVEL ${i+1}</span>
      <span class="lvl-icon">${lvl.icon}</span>
      <span class="lvl-title">${lvl.name}</span>
      <span class="lvl-desc">${gameLabel(lvl.game)}</span>
    `;
    if(unlocked) card.onclick = ()=>startGame(i);
    else card.onclick = ()=>{ card.animate([{transform:'translateX(0)'},{transform:'translateX(-5px)'},{transform:'translateX(5px)'},{transform:'translateX(0)'}],{duration:240}); };
    grid.appendChild(card);
  });
  const hint = document.createElement("div");
  hint.className = "locked-hint";
  hint.textContent = progress[currentTrack].every(Boolean)
      ? "🎉 Você terminou todos os jogos deste treino! Pode jogar de novo quando quiser."
      : "Conclua cada jogo para liberar o próximo nível 🔓";
  grid.appendChild(hint);
}
function gameLabel(g){
  return {memory:"Jogo da memória 🎴", connect:"Ligar os pares 🔗", listen:"Escutar e marcar 👂", produce:"Montar a frase 🗣️"}[g] || "";
}
function backToTrack(){ if(typeof speechSynthesis!=="undefined") speechSynthesis.cancel(); renderLevels(); show("track"); }

/* =========================================================
   MOTOR DE JOGOS
   ========================================================= */
function startGame(levelIndex){
  currentLevel = levelIndex;
  const lvl = DATA[currentTrack].levels[levelIndex];
  document.getElementById("gameIcon").textContent = lvl.icon;
  document.getElementById("gameName").textContent = lvl.name;
  document.getElementById("gameLevelTag").textContent = "Nível "+(levelIndex+1);
  document.getElementById("gameInstr").textContent = lvl.instr;
  setProgress(0);
  show("game");
  if(lvl.game==="memory") buildMemory(lvl);
  else if(lvl.game==="connect") buildConnect(lvl);
  else if(lvl.game==="listen") buildListen(lvl);
  else if(lvl.game==="produce") buildProduce(lvl);
}
function setProgress(pct){ document.getElementById("gameProgressBar").style.width = pct+"%"; }
function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function completeLevel(){
  progress[currentTrack][currentLevel] = true;
  saveProgress();
  updateHomeProgress();
}

function winScreen(msg){
  const isLast = currentLevel === 3;
  const area = document.getElementById("gameArea");
  setProgress(100);
  area.innerHTML = `
    <div class="win">
      <div class="big">🎉</div>
      <h3>${msg}</h3>
      <div class="stars-big">⭐⭐⭐</div>
      <p>${isLast ? "Você concluiu este treino inteiro. Mandou muito bem!" : "Novo jogo liberado! 🔓"}</p>
      <div class="actions">
        ${!isLast ? `<button class="btn-primary" onclick="startGame(${currentLevel+1})">Próximo jogo →</button>` : ``}
        <button class="btn-ghost" onclick="backToTrack()">Ver todos os jogos</button>
      </div>
    </div>`;
}

/* ---------- JOGO 1: Memória ---------- */
function buildMemory(lvl){
  const area = document.getElementById("gameArea");
  let deck = [];
  lvl.pairs.forEach((p,idx)=>{
    deck.push({id:idx, side:"en", text:p.en, speak:p.en});
    deck.push({id:idx, side:"pt", text:p.pt, speak:p.en});
  });
  deck = shuffle(deck);
  area.innerHTML = `<div class="mem-grid" id="memGrid"></div>`;
  const grid = document.getElementById("memGrid");
  let first=null, lock=false, matched=0;
  const total = lvl.pairs.length;

  deck.forEach((c)=>{
    const btn = document.createElement("button");
    btn.className = "mem-card";
    btn.innerHTML = `
      <div class="mem-inner">
        <div class="mem-face mem-front">🎴</div>
        <div class="mem-face mem-back ${c.side}">
          <span class="mem-tag">${c.side==="en"?"ENGLISH":"PORTUGUÊS"}</span>
          ${c.text}
        </div>
      </div>`;
    btn.onclick = ()=>{
      if(lock || btn.classList.contains("flipped") || btn.classList.contains("matched")) return;
      btn.classList.add("flipped");
      if(c.side==="en") speak(c.speak);
      if(!first){ first={card:btn,data:c}; return; }
      lock = true;
      if(first.data.id===c.id && first.data.side!==c.side){
        setTimeout(()=>{
          btn.classList.add("matched"); first.card.classList.add("matched");
          first=null; lock=false; matched++;
          setProgress(Math.round(matched/total*100));
          if(matched===total){ completeLevel(); setTimeout(()=>winScreen("Todos os pares encontrados!"),450); }
        },350);
      } else {
        setTimeout(()=>{
          btn.classList.remove("flipped"); first.card.classList.remove("flipped");
          first=null; lock=false;
        },900);
      }
    };
    grid.appendChild(btn);
  });
}

/* ---------- JOGO 2: Ligue os pares ---------- */
function buildConnect(lvl){
  const area = document.getElementById("gameArea");
  const enList = shuffle(lvl.pairs);
  const ptList = shuffle(lvl.pairs);
  area.innerHTML = `
    <div class="connect">
      <div class="col en"><h4>Inglês 🔊</h4><div class="col-items" id="colEn"></div></div>
      <div class="col pt"><h4>Português</h4><div class="col-items" id="colPt"></div></div>
    </div>`;
  const colEn = document.getElementById("colEn");
  const colPt = document.getElementById("colPt");
  let selEn=null, matched=0;
  const total = lvl.pairs.length;

  enList.forEach(p=>{
    const b=document.createElement("button");
    b.className="conn-item"; b.textContent=p.en; b.dataset.en=p.en;
    b.onclick=()=>{
      if(b.classList.contains("done")) return;
      document.querySelectorAll("#colEn .conn-item").forEach(x=>x.classList.remove("sel"));
      b.classList.add("sel"); selEn=p; speak(p.en);
    };
    colEn.appendChild(b);
  });
  ptList.forEach(p=>{
    const b=document.createElement("button");
    b.className="conn-item"; b.textContent=p.pt;
    b.onclick=()=>{
      if(b.classList.contains("done")) return;
      if(!selEn){ b.classList.add("wrong"); setTimeout(()=>b.classList.remove("wrong"),350); return; }
      if(selEn.pt===p.pt){
        const enBtn=[...document.querySelectorAll("#colEn .conn-item")].find(x=>x.dataset.en===selEn.en);
        b.classList.add("done"); if(enBtn){enBtn.classList.add("done");enBtn.classList.remove("sel");}
        speak(selEn.en);
        selEn=null; matched++;
        setProgress(Math.round(matched/total*100));
        if(matched===total){ completeLevel(); setTimeout(()=>winScreen("Você ligou todos os pares!"),400); }
      } else {
        b.classList.add("wrong"); setTimeout(()=>b.classList.remove("wrong"),350);
      }
    };
    colPt.appendChild(b);
  });
}

/* ---------- JOGO 3: Escute e marque ---------- */
function buildListen(lvl){
  const area = document.getElementById("gameArea");
  const order = shuffle(lvl.pairs);
  let idx=0;
  const total = order.length;

  function render(){
    if(idx>=total){ completeLevel(); winScreen("Você acertou tudo de ouvido!"); return; }
    const cur = order[idx];
    const distractors = shuffle(lvl.pairs.filter(p=>p.pt!==cur.pt)).slice(0,3);
    const opts = shuffle([cur, ...distractors]);
    area.innerHTML = `
      <div class="listen-stage">
        <button class="big-audio" id="bigAudio"><span class="spk">🔊</span>Ouça a palavra</button>
        <div><button class="replay" id="replayBtn">🔁 Ouvir de novo</button></div>
        <div class="prompt-label">Qual é o significado?</div>
        <div class="options" id="opts"></div>
      </div>`;
    document.getElementById("bigAudio").onclick=()=>speak(cur.en);
    document.getElementById("replayBtn").onclick=()=>speak(cur.en);
    const optsEl=document.getElementById("opts");
    opts.forEach(o=>{
      const b=document.createElement("button");
      b.className="opt"; b.textContent=o.pt;
      b.onclick=()=>{
        document.querySelectorAll("#opts .opt").forEach(x=>x.disabled=true);
        if(o.pt===cur.pt){
          b.classList.add("correct");
          setProgress(Math.round((idx+1)/total*100));
          setTimeout(()=>{ idx++; render(); },750);
        } else {
          b.classList.add("wrong");
          const right=[...optsEl.children].find(x=>x.textContent===cur.pt);
          if(right) right.classList.add("correct");
          setTimeout(()=>{ idx++; render(); },1300);
        }
      };
      optsEl.appendChild(b);
    });
    setTimeout(()=>speak(cur.en),350);
  }
  render();
}

/* ---------- JOGO 4: Monte a frase (produção) ---------- */
function buildProduce(lvl){
  const area = document.getElementById("gameArea");
  const order = shuffle(lvl.pairs);
  let idx=0;
  const total = order.length;

  function render(){
    if(idx>=total){ completeLevel(); winScreen("Desafio final concluído!"); return; }
    const cur = order[idx];
    const distractors = shuffle(lvl.pairs.filter(p=>p.en!==cur.en)).slice(0,3);
    const opts = shuffle([cur, ...distractors]);
    area.innerHTML = `
      <div class="listen-stage">
        <div class="prompt-label">Como se diz em inglês?</div>
        <div class="prompt-word">“${cur.pt}”</div>
        <div class="options" id="opts"></div>
      </div>`;
    const optsEl=document.getElementById("opts");
    opts.forEach(o=>{
      const b=document.createElement("button");
      b.className="opt"; b.textContent=o.en;
      b.onclick=()=>{
        document.querySelectorAll("#opts .opt").forEach(x=>x.disabled=true);
        if(o.en===cur.en){
          b.classList.add("correct"); speak(cur.en);
          setProgress(Math.round((idx+1)/total*100));
          setTimeout(()=>{ idx++; render(); },1050);
        } else {
          b.classList.add("wrong");
          const right=[...optsEl.children].find(x=>x.textContent===cur.en);
          if(right) right.classList.add("correct");
          speak(cur.en);
          setTimeout(()=>{ idx++; render(); },1450);
        }
      };
      optsEl.appendChild(b);
    });
  }
  render();
}

/* =========================================================
   INÍCIO
   ========================================================= */
updateHomeProgress();
</script>
</body>
